name: Backend CI


on:

  push:

    branches:
      - main
      - develop


  pull_request:

    branches:
      - main



jobs:


 build:


  runs-on: ubuntu-latest



  defaults:

    run:

      working-directory: backend



  steps:


  - name: Checkout Code

    uses: actions/checkout@v4



  - name: Setup Node

    uses: actions/setup-node@v4

    with:

      node-version: 22

      cache: npm

      cache-dependency-path: backend/package-lock.json



  - name: Install Dependencies

    run:

      npm install



  - name: Prisma Generate

    run:

      npx prisma generate



  - name: Build Backend

    run:

      npm run build
