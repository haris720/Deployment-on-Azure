name: Azure Static Web Apps CI/CD on: push: branches: - main pull_request: types: [opened, synchronize, reopened, closed] branches: - main 
jobs:
  build_and_deploy_job: if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed') runs-on: 
    ubuntu-latest name: Build and Deploy Job steps:
      - name: Checkout Repository uses: actions/checkout@v4 with: submodules: true lfs: false
      # Install Node
      - name: Setup Node uses: actions/setup-node@v4 with: node-version: 20
      # Install frontend packages
      - name: Install Frontend Dependencies working-directory: ./frontend run: npm install
      # Build React/Vite application VITE_API_URL will be embedded into production JS
      - name: Build Frontend working-directory: ./frontend env: VITE_API_URL: https://api.thexyz.live/api run: npm run build
      # Deploy Static Web App
      - name: Build And Deploy id: builddeploy uses: Azure/static-web-apps-deploy@v1 with: azure_static_web_apps_api_token: ${{ 
          secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GENTLE_WATER_0623EB300 }} repo_token: ${{ secrets.GITHUB_TOKEN }} action: "upload" 
          app_location: "./frontend" api_location: "" output_location: "dist"
  close_pull_request_job: if: github.event_name == 'pull_request' && github.event.action == 'closed' runs-on: ubuntu-latest name: Close Pull 
    Request Job steps:
      - name: Close Pull Request id: closepullrequest uses: Azure/static-web-apps-deploy@v1 with: azure_static_web_apps_api_token: ${{ 
          secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GENTLE_WATER_0623EB300 }}
          action: "close"
